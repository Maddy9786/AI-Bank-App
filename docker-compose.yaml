services:
    mysql:
      image: mysql:8.0
      container_name: bankapp-mysql
      ports:
         - "3306:3306"
      environment:
        MYSQL_ROOT_PASSWORD: Test@123
        MYSQL_DATABASE: bankappdb
      volumes:
        - mysql-data:/var/lib/mysql
      networks:
        - bankapp-net
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s


    bankapp:
      image: maddy9786/bankapp:test
      container_name: bankappbk
      ports:
        - "8081:8080"
      networks:
        - bankapp-net
      environment:
         MYSQL_HOST: mysql
         MYSQL_PORT: 3306
         MYSQL_DATABASE: bankappdb
         MYSQL_USER: root
         MYSQL_PASSWORD: Test@123
         OLLAMA_URL: http://ollama:11434
      depends_on:
         mysql:
           condition: service_healthy

    ollama:
      image: ollama/ollama
      container_name: bankapp-ollama
      ports:
        - "11434:11434"
      volumes:
        - ollama-data:/root/.ollama
      networks:
        - bankapp-net 
      

networks:
    bankapp-net:
       driver: bridge

volumes:
    mysql-data:
    ollama-data:
