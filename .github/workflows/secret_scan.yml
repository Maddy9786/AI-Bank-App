name: Secret Scan

on:
  workflow_dispatch:

jobs:
  secrets_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUBACTION_TOKEN }}